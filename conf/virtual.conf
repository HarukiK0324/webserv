server {
    listen 127.0.0.1:8080;
    server_name example.com www.example.com;
    root /var/www/html;
    index index.html index.htm;
    client_max_body_size 1000000;

    location / {
        root /var/www/html;
        index index.html;
        allow_methods GET POST;
    }

    location /images {
        root /var/www/images;
    }
}

