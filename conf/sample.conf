server {
    listen 127.0.0.1:8081;
    server_name example.com www.example.com;
    root /Users/haruki/42Tokyo/42_webserv/var/www;
    index /html/index.html /html/index.htm;
    client_max_body_size 1000000;
    error_page 404 /error_pages/404.html;

    location /www {
        autoindex on;
        allow_methods GET POST;
    }

    location /cgi-bin {
        cgi_pass .py /usr/bin/python3;
        allow_methods GET POST;
    }
    location /files {
        autoindex on;
        allow_methods GET POST;
    }
    location /upload {
        allow_methods POST DELETE;
        root /Users/haruki/42Tokyo/42_webserv/var/www/files;
        upload_path  /Users/haruki/42Tokyo/42_webserv/var/www/files;
        }
    
    location /redirect {
        return 301 https://42tokyo.jp/;
    }

    location /error_pages/404.html {
        root /Users/haruki/42Tokyo/42_webserv/;
        autoindex on;
    }   
}

server {
    listen 127.0.0.1:8082;
